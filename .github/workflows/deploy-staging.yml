name: Deploy to Production from Staging

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Deploy Frontend to Production
    runs-on: [self-hosted, Production]

    steps:
      - uses: actions/checkout@v2

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies and build
        run: |
          npm install
          npm run build -- --mode production
          ls -la dist

      - name: Sync build to VPS production folder
        run: |
          sudo rm -rf __FRONTEND_DEPLOY_PATH_PRODUCTION__/*
          sudo mkdir -p __FRONTEND_DEPLOY_PATH_PRODUCTION__
          sudo cp -a dist/. __FRONTEND_DEPLOY_PATH_PRODUCTION__/

      - name: Restart nginx
        run: sudo service nginx restart
